name: Dependency Audit

# Runs weekly on Monday at 09:00 UTC and on any requirements file change.
# Creates a GitHub issue if HIGH or CRITICAL CVEs or license problems are found.

on:
  schedule:
    - cron: "0 9 * * 1"
  push:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
      - "setup.py"
  workflow_dispatch:

jobs:
  audit:
    name: CVE & License Audit
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tools
        run: |
          pip install uv
          uv sync --frozen
          pip install pip-audit pip-licenses

      - name: CVE scan
        id: cve
        run: |
          pip-audit --format json -o cve-report.json || true
          CRITICAL=$(jq '[.dependencies[].vulns[] | select(.fix_versions | length > 0)] | length' cve-report.json 2>/dev/null || echo 0)
          echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"
          pip-audit 2>&1 | tee cve-summary.txt || true

      - name: License audit
        id: licenses
        run: |
          pip-licenses --format=markdown > license-report.md
          # Flag copyleft licenses
          PROBLEMS=$(pip-licenses | grep -cE "GPL|AGPL|SSPL" || true)
          echo "problem_count=$PROBLEMS" >> "$GITHUB_OUTPUT"
          cat license-report.md

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            cve-report.json
            cve-summary.txt
            license-report.md

      - name: Create issue if findings exist
        if: steps.cve.outputs.critical_count != '0' || steps.licenses.outputs.problem_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## Dependency Audit Findings — $(date +%Y-%m-%d)

          **CVEs requiring attention**: ${{ steps.cve.outputs.critical_count }}
          **Problematic licenses (GPL/AGPL)**: ${{ steps.licenses.outputs.problem_count }}

          ### CVE Summary
          \`\`\`
          $(cat cve-summary.txt | head -50)
          \`\`\`

          ### License Issues
          $(grep -E 'GPL|AGPL|SSPL' license-report.md || echo 'None')

          ### Action Required
          - Review and update affected packages
          - Or add justified exceptions to \`.dependency-audit-ignore\`

          _Generated by [Dependency Audit workflow](https://github.com/TylerJWhit/pigskin/actions/workflows/dependency-audit.yml)_"

          gh issue create \
            --title "chore(deps): dependency audit findings $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --label "dependencies,security" \
            --repo TylerJWhit/pigskin || true

      - name: Fail if critical CVEs found
        if: steps.cve.outputs.critical_count != '0'
        run: |
          echo "FAIL: ${{ steps.cve.outputs.critical_count }} CVEs require attention."
          exit 1
