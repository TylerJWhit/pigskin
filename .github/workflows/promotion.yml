# promotion.yml — Manual-only strategy promotion workflow
#
# MUST be triggered manually — never runs on push or schedule.
# Creates a promotion branch but NEVER auto-merges. Human review is always required.
#
# Workflow (ADR-003 §Promotion Workflow):
#   1. Run full simulation batch (≥ 500 runs, ≥ 50 distinct seeds)
#   2. Run promotion gate (gate.py): 5pp win-rate improvement + p < 0.01 required
#   3. If PASS (and not dry_run): create branch lab/promote/<strategy>-<YYYY-MM-DD>
#      copy challenger → app/strategies/production.py, open PR labelled needs-review
#   4. If FAIL: upload gate report artifact, stop — no branch or PR created
#
# Idempotent: safe to re-run; existing promotion branch will cause git push to fail
#   with a clear error (prevents silent duplicate PRs).
# Ubuntu-latest ships SQLite ≥ 3.38.0 (ADR-004 requirement satisfied).

name: Strategy Promotion

on:
  workflow_dispatch:
    inputs:
      strategy_name:
        description: "Lab strategy to evaluate (e.g. enhanced_vor_v3)"
        required: true
        type: string
      experiment_id:
        description: "Experiment ID in lab/experiments/ (leave blank to use latest)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Evaluate gate but do NOT create branch or PR"
        required: false
        type: boolean
        default: false

jobs:
  promotion-gate:
    name: Gate Evaluation
    runs-on: ubuntu-latest
    # Allow 90 min: 500-sim batch + gate evaluation (larger than lab-ci single-run cap)
    timeout-minutes: 90
    outputs:
      gate_result: ${{ steps.gate.outputs.gate_result }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify SQLite version (≥ 3.38.0 required per ADR-004)
        run: |
          python -c "
          import sqlite3
          v = sqlite3.sqlite_version_info
          assert v >= (3, 38, 0), f'SQLite {v} < 3.38.0 — required per ADR-004'
          print(f'SQLite {sqlite3.sqlite_version} OK')
          "

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          if [ -f "lab/pyproject.toml" ]; then
            pip install -e lab/
          else
            echo "::error::lab/ package not found. Promotion requires a migrated lab/ structure (ADR-001, Sprint 5)."
            exit 1
          fi

      - name: Apply database migrations (Alembic)
        run: |
          if [ -f "lab/results_db/migrations/env.py" ]; then
            cd lab && python -m alembic -c results_db/alembic.ini upgrade head
          else
            echo "::error::No Alembic migrations found. Cannot proceed without lab/results_db schema."
            exit 1
          fi

      - name: Run full simulation batch (≥ 500 runs, ≥ 50 distinct seeds — ADR-003)
        env:
          EXPERIMENT_ID: ${{ inputs.experiment_id }}
        run: |
          if [ -f "lab/simulation/runner.py" ]; then
            python lab/simulation/runner.py \
              --strategy "${{ inputs.strategy_name }}" \
              --min-simulations 500 \
              --min-seeds 50 \
              ${EXPERIMENT_ID:+--experiment "$EXPERIMENT_ID"}
          else
            echo "::error::lab/simulation/runner.py not found. Cannot run promotion without simulation batch."
            exit 1
          fi

      - name: Run promotion gate (ADR-003: ≥ 5pp improvement, p < 0.01)
        id: gate
        env:
          EXPERIMENT_ID: ${{ inputs.experiment_id }}
        run: |
          if [ -f "lab/promotion/gate.py" ]; then
            python lab/promotion/gate.py \
              --strategy "${{ inputs.strategy_name }}" \
              ${EXPERIMENT_ID:+--experiment "$EXPERIMENT_ID"} \
              --output gate_result.json

            GATE_RESULT=$(python -c "import json; print(json.load(open('gate_result.json'))['gate_result'])")
            echo "gate_result=${GATE_RESULT}" >> "$GITHUB_OUTPUT"

            echo "--- Gate Result: ${GATE_RESULT} ---"
            python -m json.tool gate_result.json
          else
            echo "::error::lab/promotion/gate.py not found. Cannot evaluate promotion gate."
            exit 1
          fi

      - name: Upload gate result artifact (retained 90 days for audit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promotion-gate-${{ inputs.strategy_name }}-${{ github.run_id }}
          path: gate_result.json
          retention-days: 90

  create-promotion-pr:
    name: Create Promotion PR
    runs-on: ubuntu-latest
    needs: promotion-gate
    # Only proceeds if gate PASSED and this is not a dry run.
    # NEVER auto-merges — human review is always required (ADR-003 §4).
    if: needs.promotion-gate.outputs.gate_result == 'PASS' && !inputs.dry_run

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          if [ -f "lab/pyproject.toml" ]; then pip install -e lab/; fi

      - name: Download gate result
        uses: actions/download-artifact@v4
        with:
          name: promotion-gate-${{ inputs.strategy_name }}-${{ github.run_id }}

      - name: Create promotion branch
        id: branch
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="lab/promote/${{ inputs.strategy_name }}-${DATE}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fail fast if branch already exists (prevents duplicate PRs — idempotency guard)
          git ls-remote --exit-code --heads origin "${BRANCH}" && {
            echo "::error::Branch ${BRANCH} already exists. Delete it or wait for existing PR to be resolved."
            exit 1
          } || true
          git checkout -b "${BRANCH}"

      - name: Archive current production strategy
        run: |
          mkdir -p app/strategies/previous
          if [ -f "app/strategies/production.py" ]; then
            ARCHIVE="app/strategies/previous/production_$(date -u +%Y%m%d).py"
            cp app/strategies/production.py "${ARCHIVE}"
            echo "Previous production strategy archived to ${ARCHIVE}"
          else
            echo "No existing app/strategies/production.py — first promotion (bootstrap replacement)"
          fi

      - name: Copy challenger strategy to app/strategies/production.py
        run: |
          if [ -f "lab/strategies/${{ inputs.strategy_name }}.py" ]; then
            cp "lab/strategies/${{ inputs.strategy_name }}.py" app/strategies/production.py
            echo "Copied lab/strategies/${{ inputs.strategy_name }}.py → app/strategies/production.py"
          else
            echo "::error::lab/strategies/${{ inputs.strategy_name }}.py not found."
            exit 1
          fi

      - name: Commit promotion changes
        run: |
          git add app/strategies/production.py app/strategies/previous/ || true
          git diff --cached --quiet && {
            echo "::warning::No changes to commit — app/strategies/production.py may already be up to date."
          } || git commit -m "promote: ${{ inputs.strategy_name }} → app/strategies/production.py

Promotion gate PASSED per ADR-003 (5pp threshold, p < 0.01).
Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
Gate timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Push promotion branch
        run: git push origin "${{ steps.branch.outputs.branch }}"

      - name: Open pull request (human review required — do not auto-merge)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GATE_JSON=$(python -m json.tool gate_result.json)

          gh pr create \
            --title "promote: ${{ inputs.strategy_name }} → production ($(date -u +%Y-%m-%d))" \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --label "promotion" \
            --label "needs-review" \
            --body "## Strategy Promotion: \`${{ inputs.strategy_name }}\`

> ⚠️ **Human review required before merging.** This PR was auto-generated by \`promotion.yml\` but must never be auto-merged. An engineer must verify the gate report before approving. (ADR-003 §4)

---

### Promotion Gate Result: PASS ✅

\`\`\`json
${GATE_JSON}
\`\`\`

---

### Review Checklist

- [ ] Win-rate improvement ≥ 5 percentage points confirmed
- [ ] p-value < 0.01 (two-sample proportion z-test) confirmed
- [ ] Budget efficiency: challenger avg efficiency ≥ current − 1%
- [ ] Sanity floor: challenger win-rate vs. Random ≥ 80%
- [ ] Variance gate: challenger σ(win-rate) ≤ current σ + 5%
- [ ] Same seed list used as registered at experiment creation (seed consistency)
- [ ] Benchmark report reviewed: \`lab/experiments/<experiment_id>/report.md\`
- [ ] Previous production strategy archived to \`app/strategies/previous/\`
- [ ] App CI (\`app-ci.yml\`) passes on this branch after merge

