name: Lint Gate

# ruff gate: catches logic errors (F4xx, F8xx), syntax errors (E9), and
# invalid-escape warnings (W605) without enforcing full PEP-8 style.
# Full style enforcement deferred until a formatting pass is done.

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
      - "sprint/**"

jobs:
  lint:
    name: ruff logic-error gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.3"

      - name: Run ruff lint gate
        run: |
          ruff check \
            --select=F401,F811,F541,F841,E9,W605 \
            --line-length=120 \
            --exclude=venv,pigskin_auction_uuid.egg-info,.agents \
            .

  dead-code:
    name: vulture dead-code gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install vulture
        run: pip install vulture>=2.11

      - name: Run vulture
        run: |
          python -m vulture . \
            --min-confidence 80 \
            --exclude venv,tests,lab,pigskin_auction_draft.egg-info
