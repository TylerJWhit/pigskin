name: Lint Gate

# Focused flake8 gate: catches logic errors (F8xx), syntax errors (E9), and
# deprecated-syntax warnings (W6) without enforcing full PEP-8 style.
# Full style enforcement (E1xx, W2xx) is deferred until a formatting pass is done.

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
      - "sprint/**"

jobs:
  lint:
    name: flake8 logic-error gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run lint gate
        run: |
          flake8 strategies/ classes/ services/ api/ config/ cli/ utils/ data/ tests/ \
            --select=F401,F811,F541,F841,E9,W6 \
            --max-line-length=120 \
            --exclude=venv,*.egg-info \
            --count \
            --show-source \
            --statistics

  dead-code:
    name: vulture dead-code gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install vulture
        run: pip install vulture>=2.11

      - name: Run vulture
        run: |
          python -m vulture . \
            --min-confidence 80 \
            --exclude venv,tests,lab,pigskin_auction_draft.egg-info
