name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 . --max-line-length=120 \
            --select=F401,F811,F541,F841,E9,W6 \
            --exclude=venv,pigskin_auction_draft.egg-info \
            --count --show-source --statistics

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports --exclude venv

      - name: Security scan with bandit
        run: bandit -r . -ll --exclude ./venv,./tests,./pigskin_auction_draft.egg-info

      - name: Run unit tests with coverage
        run: pytest tests/ -x -q --timeout=60 --cov=. --cov-fail-under=85 --cov-report=xml --cov-omit="venv/*,tests/*,setup.py"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run integration tests
        run: pytest tests/test_integration.py -v --timeout=120
