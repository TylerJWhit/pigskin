name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv sync --frozen
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Lint with ruff
        run: |
          ruff check . \
            --select=F401,F811,F541,F841,E9,W605 \
            --line-length=120 \
            --exclude=venv,pigskin_auction_draft.egg-info,.agents

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports --exclude venv

      - name: Security scan with bandit
        run: bandit -r . -ll --exclude ./venv,./.venv,./tests,./pigskin_auction_draft.egg-info

      - name: Run unit tests with coverage
        run: pytest tests/ -x -q --timeout=60 --cov=. --cov-fail-under=90 --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run integration tests
        run: pytest tests/test_integration.py -v --timeout=120
